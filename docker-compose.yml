version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bouncer-postgres
    environment:
      POSTGRES_DB: bouncer
      POSTGRES_USER: bouncer
      POSTGRES_PASSWORD: bouncer_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
      - ./database/seeds/subjects.sql:/docker-entrypoint-initdb.d/003_seed_subjects.sql:ro
    healthcheck:
      test: pg_isready -U bouncer -d bouncer
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: bouncer-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/bouncer-realm.json:/opt/keycloak/data/import/bouncer-realm.json:ro

volumes:
  postgres_data:
